<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVault - Secure Investment Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e) !important;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e) !important;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(30, 144, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #8b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo::before {
            content: '₿';
            font-size: 2.5rem;
        }

        .tagline {
            font-size: 0.85rem;
            color: #b0b0b0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #e0e0e0;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: #888;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #8b2fff, #5a1e7a);
            color: #fff;
            box-shadow: 0 4px 15px rgba(139, 47, 255, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 47, 255, 0.5);
        }

        .btn-forgot {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: transparent;
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            font-size: 0.85rem;
            box-shadow: none;
        }

        .btn-forgot:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #4caf50;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #f44336;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .divider {
            margin: 25px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        }

        .divider span {
            background: rgba(255, 255, 255, 0.05);
            padding: 0 10px;
            font-size: 0.85rem;
            color: #888;
            position: relative;
        }

        .security-info {
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid #00d4ff;
            border-radius: 5px;
            font-size: 0.8rem;
            color: #b0b0b0;
        }

        .security-info strong {
            color: #00d4ff;
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            .logo {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">CryptoVault</div>
            <p class="tagline">Secure Investment Platform</p>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <div style="display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px;">
                <button class="mode-toggle active" onclick="switchMode('login')" style="flex: 1; padding: 10px; border: none; background: transparent; color: #00d4ff; cursor: pointer; font-weight: 600; border-radius: 8px; border-bottom: 2px solid #00d4ff; transition: all 0.3s;">Sign In</button>
                <button class="mode-toggle" onclick="switchMode('signup')" style="flex: 1; padding: 10px; border: none; background: transparent; color: #888; cursor: pointer; font-weight: 600; border-radius: 8px; transition: all 0.3s;">Create Account</button>
            </div>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn-primary" onclick="login()" style="width: 100%;">
  Sign In
</button>
        <button class="btn-forgot" onclick="resetPassword()">Forgot Password?</button>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" style="display: none;">
        <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="At least 6 characters">
        </div>

        <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" placeholder="Confirm your password">
        </div>

        <button class="btn-secondary" onclick="signup()" style="width: 100%;">Create Account</button>
        </div>

        <div id="message" class="message"></div>

        <div class="security-info">
            🔒 <strong>Bank-level security:</strong> Your data is encrypted end-to-end using industry-leading protocols.
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDBtM_t1l2wd_BHwbtUWa37HogdDgQew9I",
  authDomain: "mine-project-daea5.firebaseapp.com",
  projectId: "mine-project-daea5",
  storageBucket: "mine-project-daea5.firebasestorage.app",
  messagingSenderId: "677923336045",
  appId: "1:677923336045:web:bfdab8d21f00f569ff7464",
  measurementId: "G-5WCEHSZEV5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showMessage(text, type = 'success') {
  const messageEl = document.getElementById("message");
  messageEl.innerText = text;
  messageEl.className = `message show ${type}`;
  setTimeout(() => {
    messageEl.classList.remove('show');
  }, 6000);
}

// SWITCH BETWEEN LOGIN AND SIGNUP MODES
window.switchMode = function(mode) {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const toggles = document.querySelectorAll('.mode-toggle');
  
  if (mode === 'login') {
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    toggles[0].style.borderBottom = '2px solid #00d4ff';
    toggles[0].style.color = '#00d4ff';
    toggles[1].style.borderBottom = 'none';
    toggles[1].style.color = '#888';
    toggles[0].classList.add('active');
    toggles[1].classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    toggles[0].style.borderBottom = 'none';
    toggles[0].style.color = '#888';
    toggles[1].style.borderBottom = '2px solid #8b2fff';
    toggles[1].style.color = '#8b2fff';
    toggles[0].classList.remove('active');
    toggles[1].classList.add('active');
  }
  document.getElementById("message").className = 'message';
};

// SIGN UP
window.signup = function() {
  const name = document.getElementById("signup-name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value;
  const confirm = document.getElementById("signup-confirm").value;

  if (!name || !email || !password || !confirm) {
    showMessage('⚠️ Please fill in all fields', 'error');
    return;
  }

  if (name.length < 2) {
    showMessage('⚠️ Please enter a valid name', 'error');
    return;
  }

  if (password.length < 6) {
    showMessage('⚠️ Password must be at least 6 characters', 'error');
    return;
  }

  if (password !== confirm) {
    showMessage('⚠️ Passwords do not match', 'error');
    return;
  }

  if (!email.includes('@')) {
    showMessage('⚠️ Please enter a valid email', 'error');
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      // Update user profile with display name
      return userCredential.user.getIdToken().then(async () => {
        // Store user name in Firestore or use Firebase displayName
        const user = userCredential.user;
        console.log('User created:', user.email);
        
        // Store name in localStorage
        localStorage.setItem(`user_${user.uid}_name`, name);
        localStorage.setItem(`user_${user.uid}_email`, email);
        
        // Create user document in Firestore with initial balance of 0
        try {
          await setDoc(doc(db, "users", user.uid), {
            name: name,
            email: user.email,
            balance: 0,
            createdAt: new Date().toISOString()
          });
          console.log("✅ User document created in Firestore");
        } catch (error) {
          console.error("Error creating user document:", error);
        }
        
        showMessage('✅ Account created successfully!', 'success');
        setTimeout(() => {
          document.getElementById("signup-name").value = '';
          document.getElementById("signup-email").value = '';
          document.getElementById("signup-password").value = '';
          document.getElementById("signup-confirm").value = '';
          window.switchMode('login');
          document.getElementById("email").value = email;
          showMessage('📧 You can now sign in with your account!', 'success');
        }, 1500);
      });
    })
    .catch(err => {
      let errorMsg = err.message;
      if (err.code === 'auth/email-already-in-use') {
        errorMsg = 'This email is already registered. Try signing in instead.';
      } else if (err.code === 'auth/weak-password') {
        errorMsg = 'Password is too weak. Use at least 6 characters.';
      } else if (err.code === 'auth/invalid-email') {
        errorMsg = 'Invalid email address.';
      }
      showMessage(`❌ ${errorMsg}`, 'error');
    });
};

// LOGIN
window.login = function() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showMessage('⚠️ Please enter email and password', 'error');
    return;
  }

  if (!email.includes('@')) {
    showMessage('⚠️ Please enter a valid email', 'error');
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;
      const storedName = localStorage.getItem(`user_${user.uid}_name`);
      const userName = storedName || user.displayName || email.split('@')[0];
      
      // Always update/store the name for future logins
      if (!storedName && userName) {
        localStorage.setItem(`user_${user.uid}_name`, userName);
      }
      
      console.log("✅ User logged in:", email, "Name:", userName, "Stored:", storedName);
      
      // Store current user info in sessionStorage
      sessionStorage.setItem('currentUser', JSON.stringify({
        uid: user.uid,
        email: user.email,
        name: userName
      }));
      sessionStorage.setItem('userName', userName);
      
      // Show success message
      showMessage(`✅ Welcome ${userName}!`, 'success');
      
      // Redirect to dashboard immediately
      window.location.href = 'dashboard.html';
    })
    .catch(err => {
      let errorMsg = err.message;
      if (err.code === 'auth/user-not-found') {
        errorMsg = 'No account found with this email. Please create an account first.';
      } else if (err.code === 'auth/wrong-password') {
        errorMsg = 'Incorrect password. Please try again.';
      } else if (err.code === 'auth/invalid-credential') {
        errorMsg = 'Invalid email or password. Please check and try again or create a new account.';
      } else if (err.code === 'auth/too-many-requests') {
        errorMsg = 'Too many failed login attempts. Please try again later.';
      }
      showMessage(`❌ ${errorMsg}`, 'error');
    });
};

// RESET PASSWORD
window.resetPassword = function() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    showMessage('⚠️ Please enter your email address', 'error');
    return;
  }

  if (!email.includes('@')) {
    showMessage('⚠️ Please enter a valid email', 'error');
    return;
  }

  sendPasswordResetEmail(auth, email)
    .then(() => {
      showMessage('📧 Password reset email sent! Check your inbox (and spam folder).', 'success');
    })
    .catch(err => {
      let errorMsg = err.message;
      if (err.code === 'auth/user-not-found') {
        errorMsg = 'No account found with this email.';
      }
      showMessage(`❌ ${errorMsg}`, 'error');
    });
};

// CHECK LOGIN STATE - Only for persistence on page reload
let isRedirecting = false;
onAuthStateChanged(auth, (user) => {
  if (user && !isRedirecting) {
    const userName = localStorage.getItem(`user_${user.uid}_name`) || user.displayName || user.email.split('@')[0];
    console.log("✅ User already logged in:", user.email, "Name:", userName);
    
    // Store in session for dashboard access
    window.currentUser = {
      uid: user.uid,
      email: user.email,
      name: userName
    };
  }
});

// HELPER FUNCTION: Get current logged-in user info for dashboard
window.getCurrentUser = function() {
  return window.currentUser || JSON.parse(sessionStorage.getItem('currentUser')) || null;
};

// HELPER FUNCTION: Display user greeting on dashboard
window.displayUserGreeting = function(elementId = 'user-greeting') {
  const user = window.getCurrentUser();
  if (user && document.getElementById(elementId)) {
    document.getElementById(elementId).innerHTML = `Welcome, <strong>${user.name}</strong>! 👋`;
  }
};

// HELPER FUNCTION: Display user profile info
window.displayUserProfile = function() {
  const user = window.getCurrentUser();
  if (user) {
    return {
      name: user.name,
      email: user.email,
      uid: user.uid
    };
  }
  return null;
};

// AUTO-DISPLAY GREETING ON PAGE LOAD
document.addEventListener('DOMContentLoaded', function() {
  window.displayUserGreeting();
});
</script>
</body>
</html>
